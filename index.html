<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>台中慈濟醫院－藥品母庫儲位查詢</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#f0ede8;display:flex;justify-content:center;min-height:100vh;font-family:'Noto Sans JP',sans-serif;}
.frame{width:100%;max-width:430px;min-height:100vh;display:flex;flex-direction:column;background:#fff;}
.hdr{padding:22px 18px 16px;border-bottom:3px solid #F5C800;display:flex;align-items:center;gap:12px;}
.hdr-bar{width:8px;height:58px;background:#F5C800;flex-shrink:0;border-radius:1px;}
.htitle{font-size:24px;font-weight:700;letter-spacing:0.05em;color:#1a1a1a;line-height:1.45;}
.body{padding:16px 18px;flex:1;}

/* 提示文字 - 加大 */
.hint{font-size:10px;font-weight:300;color:#b0a090;margin-bottom:10px;display:flex;align-items:center;flex-wrap:nowrap;gap:4px;white-space:nowrap;overflow:hidden;}
.hint span{background:#F5C800;color:#1a1a1a;font-weight:700;padding:1px 6px;font-size:10px;flex-shrink:0;}

.srow{display:flex;border:2px solid #F5C800;overflow:hidden;margin-bottom:8px;}
.srow input{flex:1;padding:12px 14px;border:none;font-size:15px;font-weight:300;background:#fff;color:#1a1a1a;outline:none;font-family:'Noto Sans JP',sans-serif;}
.srow input::placeholder{color:#ccc;font-size:13px;}
.clear-btn{padding:0 14px;border:none;background:#fff;color:#bbb;font-size:18px;cursor:pointer;display:none;align-items:center;}
.clear-btn.show{display:flex;}
.update-bar{font-size:10px;color:#b0a090;text-align:right;margin-bottom:10px;}
.update-bar span{color:#9a8a78;}
.cnt{font-size:11px;font-weight:300;color:#9a8a78;letter-spacing:0.15em;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid #e0dbd0;}
.cnt b{font-size:16px;font-weight:700;color:#1a1a1a;}

/* 卡片 */
.card{border-bottom:1px solid #e0dbd0;padding:14px 0;}
.card:first-child{border-top:1px solid #e0dbd0;}

/* 學名：最大最粗 */
.dgen{
  font-size:20px;
  font-weight:900;
  color:#1a1a1a;
  font-family:'Noto Sans JP','Arial Black',Arial,sans-serif;
  line-height:1.25;
  margin-bottom:2px;
}
.dspec{font-size:13px;font-weight:400;color:#cc2200;font-family:Arial,sans-serif;margin-left:8px;}
.drug-top{display:flex;align-items:baseline;flex-wrap:wrap;margin-bottom:3px;}
.dname{font-size:13px;font-weight:400;color:#9a8a78;margin-bottom:10px;}
.dcod{font-size:12px;font-weight:600;color:#1a1a1a;letter-spacing:0.05em;text-align:right;margin-bottom:6px;}

/* 儲位並列 */
.slots{display:flex;gap:8px;}
.sb{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.sh{display:flex;height:26px;}
.si{width:26px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.si svg{width:12px;height:12px;stroke:#1a1a1a;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.sl{flex:1;display:flex;align-items:center;padding:0 8px;font-size:11px;font-weight:700;letter-spacing:0.03em;}
.sn-wrap{display:flex;align-items:baseline;gap:6px;padding:8px 10px 10px;}
.sn{font-size:22px;font-weight:700;letter-spacing:0.05em;line-height:1;}
.sen{font-size:8px;font-weight:300;letter-spacing:0.1em;align-self:flex-end;padding-bottom:2px;opacity:0.5;}

.p .si{background:#F5C800;}.p .sl{background:#F5C800;color:#1a1a1a;}
.p .sn-wrap{background:#0d2a5e;}.p .sn{color:#F5C800;}.p .sen{color:#a8c4e8;}
.wh .si{background:#d5d5d5;}.wh .sl{background:#d5d5d5;color:#3a3a3a;}
.wh .sn-wrap{background:#484848;}.wh .sn{color:#fff;}.wh .sen{color:#ccc;}

.loading{text-align:center;padding:2.5rem 1rem;color:#9a8a78;font-size:13px;}
.ld{display:inline-block;width:6px;height:6px;background:#F5C800;border-radius:50%;margin:0 3px;animation:bk 1.2s infinite;}
.ld:nth-child(2){animation-delay:0.2s;}.ld:nth-child(3){animation-delay:0.4s;}
@keyframes bk{0%,80%,100%{opacity:0.2;}40%{opacity:1;}}
.empty{text-align:center;padding:3rem 1rem;color:#b0a090;font-size:13px;}
.err{text-align:center;padding:1.5rem;color:#993333;font-size:12px;border:1px solid #f0c0c0;border-radius:4px;background:#fff8f8;line-height:2;}
.pg{display:flex;align-items:center;justify-content:center;gap:10px;padding:16px 0 8px;}
.pg-btn{padding:7px 18px;border:1.5px solid #F5C800;background:#fff;color:#1a1a1a;font-size:12px;font-weight:700;cursor:pointer;letter-spacing:0.1em;font-family:'Noto Sans JP',sans-serif;}
.pg-btn:disabled{border-color:#e0dbd0;color:#ccc;cursor:default;}
.pg-btn:not(:disabled):hover{background:#F5C800;}
.pg-info{font-size:12px;font-weight:300;color:#9a8a78;min-width:60px;text-align:center;}
.footer{padding:20px 24px 24px;border-top:2px solid #F5C800;background:#f7f4ee;text-align:center;}
.footer-deco{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:12px;}
.footer-line{height:1px;width:28px;background:#F5C800;opacity:0.6;}
.footer-diamond{width:4px;height:4px;background:#F5C800;transform:rotate(45deg);}
.footer-divider{height:1px;background:#e0d8cc;margin:10px 0;}
.footer-main{font-size:15px;font-weight:700;letter-spacing:0.1em;color:#1a1a1a;margin-bottom:10px;}
.footer-row{font-size:11px;font-weight:400;color:#7a6a5a;letter-spacing:0.08em;line-height:2;}
.footer-label{color:#aaa;margin-right:4px;}
.footer-year{font-size:11px;font-weight:300;color:#b0a090;letter-spacing:0.2em;font-family:Arial,sans-serif;}
</style>
</head>
<body>
<div class="frame">
  <div class="hdr">
    <div class="hdr-bar"></div>
    <div class="htitle">台中慈濟醫院<br>藥品母庫（藥庫）儲位查詢</div>
  </div>

  <div class="body">
    <div class="hint">可輸入：<span>學名</span><span>中文名稱</span><span>英文商品名</span><span>西藥局儲位</span><span>料號</span>即時查詢</div>
    <div class="srow">
      <input type="text" id="si" placeholder="藥名 / 學名 / 料號 / 儲位…" oninput="onInput()"/>
      <button class="clear-btn" id="clearBtn" onclick="clearSearch()">✕</button>
    </div>
    <div class="update-bar" id="updateBar">資料載入中…</div>
    <div class="cnt" id="cnt"></div>
    <div id="res"><div class="loading"><span class="ld"></span><span class="ld"></span><span class="ld"></span><br><br>資料載入中…</div></div>
    <div class="pg" id="pgbar" style="display:none;">
      <button class="pg-btn" id="prevBtn" onclick="changePage(-1)">上一頁</button>
      <div class="pg-info" id="pginfo"></div>
      <button class="pg-btn" id="nextBtn" onclick="changePage(1)">下一頁</button>
    </div>
  </div>

  <div class="footer">
    <div class="footer-deco">
      <div class="footer-line"></div>
      <div class="footer-diamond"></div>
      <div class="footer-line"></div>
    </div>
    <div class="footer-main">台中慈濟醫院　藥學部</div>
    <div class="footer-divider"></div>
    <div class="footer-row"><span class="footer-label">製作</span>許文馨</div>
    <div class="footer-row"><span class="footer-label">協力</span>張紀卿・胡家瑜・廖暄旻</div>
    <div class="footer-divider"></div>
    <div class="footer-year">2026.4</div>
  </div>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbx9OP0JyYx9aBHgOCVgYiE6wBSetz3OSG34ZMf3Dp3nyV03Vrs752jqYUZHhi7WDLgF/exec';
const PAGE_SIZE = 5;
const REFRESH_INTERVAL = 60 * 60 * 1000;
let ALL = [], filtered = [], page = 0, cs = '';

const iP = `<svg viewBox="0 0 16 16"><path d="M3 8h10M8 3v10"/></svg>`;
const iW = `<svg viewBox="0 0 16 16"><rect x="2" y="7" width="12" height="7"/><polyline points="1,7 8,2 15,7"/></svg>`;

function formatTime(date) {
  const h = String(date.getHours()).padStart(2,'0');
  const m = String(date.getMinutes()).padStart(2,'0');
  return `${date.getMonth()+1}/${date.getDate()} ${h}:${m}`;
}

async function loadData(isRefresh = false) {
  try {
    if (!isRefresh) {
      document.getElementById('res').innerHTML =
        '<div class="loading"><span class="ld"></span><span class="ld"></span><span class="ld"></span><br><br>資料載入中…</div>';
    }
    const res = await fetch(API_URL + '?t=' + Date.now());
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const rows = await res.json();

    ALL = rows.map(r => ({
      p: String(r['西藥局儲位'] || '').trim(),
      w: String(r['藥庫儲位']   || '').trim(),
      n: String(r['中文名稱']   || '').trim(),
      g: String(r['學名']       || '').trim(),
      s: String(r['規格']       || '').trim(),
      c: String(r['料號']       || '').trim(),
      t: String(r['英文商品名稱'] || '').trim(),
    })).filter(d => d.n || d.g || d.p);

    const now = new Date();
    document.getElementById('updateBar').innerHTML =
      `資料更新：<span>${formatTime(now)}</span>　共 ${ALL.length} 筆　每小時自動同步`;
    run();
  } catch(e) {
    document.getElementById('updateBar').innerHTML = `⚠ 更新失敗：${e.message}`;
    if (!isRefresh) {
      document.getElementById('res').innerHTML =
        `<div class="err">⚠ 無法載入資料<br><small>${e.message}</small></div>`;
      document.getElementById('cnt').innerHTML = '';
    }
  }
}

function totalPages() { return Math.ceil(filtered.length / PAGE_SIZE) || 1; }

function render() {
  const total = filtered.length;
  const tp = totalPages();
  const slice = filtered.slice(page * PAGE_SIZE, (page + 1) * PAGE_SIZE);
  document.getElementById('cnt').innerHTML = `<b>${total}</b> 件`;
  const r = document.getElementById('res');
  const pg = document.getElementById('pgbar');
  if (!total) {
    r.innerHTML = '<div class="empty">查無符合藥品，請嘗試其他關鍵字</div>';
    pg.style.display = 'none';
    return;
  }
  r.innerHTML = slice.map(d => `
    <div class="card">
      ${d.c ? `<div class="dcod">料號　${d.c}</div>` : ''}
      <div class="drug-top">
        <span class="dgen">${d.g || d.t || '—'}</span>
        ${d.s ? `<span class="dspec">${d.s}</span>` : ''}
      </div>
      <div class="dname">${d.n}</div>
      <div class="slots">
        <div class="sb p">
          <div class="sh"><div class="si">${iP}</div><div class="sl">西藥局儲位</div></div>
          <div class="sn-wrap"><div class="sn">${d.p || '—'}</div></div>
        </div>
        <div class="sb wh">
          <div class="sh"><div class="si">${iW}</div><div class="sl">藥庫儲位</div></div>
          <div class="sn-wrap"><div class="sn">${d.w || '—'}</div></div>
        </div>
      </div>
    </div>`).join('');
  pg.style.display = tp > 1 ? 'flex' : 'none';
  document.getElementById('pginfo').textContent = `${page + 1} / ${tp}`;
  document.getElementById('prevBtn').disabled = page === 0;
  document.getElementById('nextBtn').disabled = page >= tp - 1;
}

function run() {
  const q = cs.toLowerCase();
  filtered = cs ? ALL.filter(d =>
    d.n.toLowerCase().includes(q) ||
    d.g.toLowerCase().includes(q) ||
    d.t.toLowerCase().includes(q) ||
    d.p.toLowerCase().includes(q) ||
    d.c.toLowerCase().includes(q) ||
    d.s.toLowerCase().includes(q)
  ) : [...ALL];
  page = 0;
  render();
}

function onInput() {
  cs = document.getElementById('si').value.trim();
  document.getElementById('clearBtn').classList.toggle('show', cs.length > 0);
  run();
}

function clearSearch() {
  document.getElementById('si').value = '';
  cs = '';
  document.getElementById('clearBtn').classList.remove('show');
  run();
  document.getElementById('si').focus();
}

function changePage(dir) { page += dir; window.scrollTo(0,0); render(); }
loadData(false);
setInterval(() => loadData(true), REFRESH_INTERVAL);
</script>
</body>
</html>
